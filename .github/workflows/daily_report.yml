name: Forex Daily Report

on:
  schedule:
    # 工作日每天上午8点（UTC时间）运行，即北京时间下午4点
    - cron: '0 8 * * 1-5'
  workflow_dispatch:    # 允许手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install akshare pandas yfinance

      - name: Run forex report
        run: python forex_report.py
