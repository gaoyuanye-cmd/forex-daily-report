name: Forex Daily Report

on:
  schedule:
    # 工作日每天上午8点运行（UTC时间），可根据需要调整
    - cron: '0 8 * * 1-5'
  workflow_dispatch:    # 允许手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install akshare pandas

      - name: Run forex report
        run: python forex_report.py
