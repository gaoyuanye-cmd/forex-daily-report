name: Forex Daily Report

on:
  schedule:
    # 每天北京时间 09:00 运行（UTC 01:00）
    - cron: '0 1 * * *'
  workflow_dispatch:    # 保留手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install akshare pandas yfinance

      - name: Verify secrets availability (debug)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          if [ -n "$DEEPSEEK_API_KEY" ]; then echo "✓ DEEPSEEK_API_KEY is set"; else echo "⚠️ DEEPSEEK_API_KEY is NOT set"; fi
          if [ -n "$DINGTALK_WEBHOOK" ]; then echo "✓ DINGTALK_WEBHOOK is set"; else echo "⚠️ DINGTALK_WEBHOOK is NOT set"; fi

      - name: Run forex report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python forex_report.py
